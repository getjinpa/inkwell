  />

  <!-- Quill nib/tip -->
  <path
    d="M10 20 C10.5 21.5 11 22.5 10.5 24 C9.8 23 9.5 21.5 10 20 Z"
    fill="#B8860B"
  />

  <!-- Ink line / pen stroke -->
  <path
    d="M10.5 24 C12 25.5 15 26.5 19 26"
    stroke="#B8860B"
    stroke-width="1.2"
    stroke-linecap="round"
