<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1B2A4A"/>

  <!-- Quill feather body -->
  <path
    d="M22 5 C18 7 12 12 10 20 C11 20 12 19.5 13 19 C14 15 17 10 22 5 Z"
    fill="#F8F4E8"
    opacity="0.95"
  />
  <!-- Feather barbs -->
  <path
    d="M22 5 C20 8 16 11 13 14 M22 5 C19 9 15 13 12 17"
    stroke="#F8F4E8"
